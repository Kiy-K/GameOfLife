env:
  width: 256
  height: 256
  density: 0.2
  seed: 42
  backend: quicklife
  wrap: false
  max_generations: 500
  patch_size: 32
  model_view_size: 64
  lambda_penalty: 0.1

train:
  seed: 42
  epochs: 24
  updates_per_epoch: 4
  num_envs: 8
  rollout_steps: 128
  ppo_epochs: 4
  minibatch_size: 128
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  forward_coef: 1.0
  forward_warmup_epochs: 5
  forward_batches_per_epoch: 8
  forward_hidden_channels: 24
  lambda_start: 0.1
  lambda_end: 0.3
  quantize_policy: true
  num_workers: 7
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 4
  matmul_precision: high
  accumulate_grad_batches: 1
  log_dir: runs
