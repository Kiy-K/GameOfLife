env:
  backend: hashlife-tree
  density: 0.2
  height: 256
  lambda_penalty: 0.1
  max_generations: 500
  model_view_size: 64
  patch_size: 32
  seed: 42
  width: 256
  wrap: false
train:
  accumulate_grad_batches: 1
  clip_eps: 0.2
  entropy_coef: 0.01
  epochs: 24
  forward_batches_per_epoch: 8
  forward_coef: 1.0
  forward_hidden_channels: 24
  forward_warmup_epochs: 5
  gae_lambda: 0.95
  gamma: 0.99
  lambda_end: 0.3
  lambda_start: 0.1
  learning_rate: 0.0003
  log_dir: runs
  matmul_precision: high
  minibatch_size: 128
  num_envs: 8
  num_workers: 7
  persistent_workers: false
  pin_memory: false
  ppo_epochs: 4
  prefetch_factor: 4
  quantize_policy: true
  rollout_steps: 128
  seed: 42
  updates_per_epoch: 4
  value_coef: 0.5
